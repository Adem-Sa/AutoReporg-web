<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Reprog</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00bcd4;
        }
        .services {
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            box-sizing: border-box;
        }
        .btn {
            background-color: #00bcd4;
            color: #000;
            padding: 12px;
            border: none;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #008c9e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Auto Reprog</h1>
        
        <div class="services">
            <p><strong>Diagnostic & Reprogrammation Calculateur</strong></p>
            <p>Analyse de pannes, clonage d'ECU et optimisation électronique automobile.</p>
        </div>

        <section id="devis">
            <h2>Formulaire de Contact</h2>
            <br>
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="5812357c-d439-4a5a-86a8-f2a4ee054a09">
                
                <input type="hidden" name="from_name" value="Auto Reprog">
                <input type="hidden" name="subject" value="Nouvelle demande client">

                <div class="form-group">
                    <label>Nom ou Garage :</label>
                    <input type="text" name="Nom_Garage" class="form-control" placeholder="Ex: Garage X" required>
                </div>
                
                <div class="form-group">
                    <label>Téléphone :</label>
                    <input type="tel" name="Telephone" class="form-control" placeholder="Votre numéro" required>
                </div>
                
                <div class="form-group">
                    <label>Véhicule :</label>
                    <input type="text" name="Vehicule" class="form-control" placeholder="Ex: Golf 7 2.0 TDI" required>
                </div>
                
                <div class="form-group">
                    <label>Calculateur (Si connu) :</label>
                    <input type="text" name="Type_Calculateur" class="form-control" placeholder="Ex: Bosch EDC17C64, Delphi DCM3.7">
                </div>
                
                <div class="form-group">
                    <label>Prestation :</label>
                    <select name="Prestation" class="form-control" required>
                        <option value="">-- Choisir --</option>
                        <option value="Diagnostic / Codage">Diagnostic / Codage</option>
                        <option value="Reprogrammation">Reprogrammation</option>
                        <option value="Clonage ECU">Clonage ECU / Récupération</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Message / Codes défauts :</label>
                    <textarea name="Message" class="form-control" rows="4" placeholder="Détails de la demande..."></textarea>
                </div>
                
                <input type="checkbox" name="botcheck" style="display: none;">

                <button type="submit" class="btn">Envoyer</button>
            </form>
        </section>
    </div>

</body>
</html>
